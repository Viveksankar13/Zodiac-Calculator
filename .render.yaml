services:
  - type: web_service
    name: Acharya Zodiac Calculator Backend
    env: python
    plan: starter
    region: singapore
    branch: main
    root: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
